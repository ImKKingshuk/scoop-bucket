name: Update Bucket

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: Manifest to update
        required: true
        type: choice
        options:
          - lockknife

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release asset
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MANIFEST="${{ inputs.manifest }}"

          case "$MANIFEST" in
            lockknife)
              REPO="ImKKingshuk/LockKnife"
              ASSET_REGEX='^lockknife-[0-9.]+-cp312-abi3-win_amd64\.whl$'
              URL_SUFFIX='#/lockknife.whl'
              ;;
            *)
              echo "::error::Unknown manifest: $MANIFEST"
              exit 1
              ;;
          esac

          RELEASE_JSON="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases/latest")"

          TAG="$(jq -r '.tag_name' <<<"$RELEASE_JSON")"
          VERSION="${TAG#v}"
          ASSET_URL="$(jq -r --arg rx "$ASSET_REGEX" '.assets[] | select(.name | test($rx)) | .browser_download_url' <<<"$RELEASE_JSON" | head -n1)"
          ASSET_DIGEST="$(jq -r --arg rx "$ASSET_REGEX" '.assets[] | select(.name | test($rx)) | .digest' <<<"$RELEASE_JSON" | head -n1)"
          ASSET_HASH="${ASSET_DIGEST#sha256:}"

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "::error::Could not resolve a release asset for ${MANIFEST}"
            exit 1
          fi

          if [ -z "$ASSET_HASH" ] || [ "$ASSET_HASH" = "null" ]; then
            echo "::error::Could not resolve a SHA256 digest for ${MANIFEST}"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "url=${ASSET_URL}${URL_SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "sha256=${ASSET_HASH}" >> "$GITHUB_OUTPUT"

      - name: Update manifest file
        run: |
          MANIFEST_PATH="bucket/${{ inputs.manifest }}.json"
          TMP_FILE="$(mktemp)"

          jq \
            --arg version "${{ steps.resolve.outputs.version }}" \
            --arg url "${{ steps.resolve.outputs.url }}" \
            --arg hash "${{ steps.resolve.outputs.sha256 }}" \
            '
              .version = $version
              | .architecture["64bit"].url = $url
              | .architecture["64bit"].hash = $hash
            ' "$MANIFEST_PATH" > "$TMP_FILE"

          mv "$TMP_FILE" "$MANIFEST_PATH"
          jq empty "$MANIFEST_PATH"

      - name: Detect manifest changes
        id: diff
        run: |
          if git diff --quiet -- "bucket/${{ inputs.manifest }}.json"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload updated manifest
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: updated-manifest
          path: bucket/${{ inputs.manifest }}.json

  validate:
    needs: prepare
    if: needs.prepare.outputs.changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download updated manifest
        uses: actions/download-artifact@v4
        with:
          name: updated-manifest
          path: .

      - name: Install Scoop
        shell: powershell
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression

      - name: Add local bucket
        shell: powershell
        run: |
          $bucketRoot = (Resolve-Path $env:GITHUB_WORKSPACE).Path
          scoop bucket add imkkingshuk $bucketRoot

      - name: Install updated manifest
        shell: powershell
        run: |
          scoop install imkkingshuk/${{ inputs.manifest }}
          lockknife --version

  publish:
    needs: [prepare, validate]
    if: needs.prepare.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download updated manifest
        uses: actions/download-artifact@v4
        with:
          name: updated-manifest
          path: .

      - name: Commit update
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

          git add "bucket/${{ inputs.manifest }}.json"

          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git commit -m "bucket: update ${{ inputs.manifest }} to v${{ needs.prepare.outputs.version }}"
          git pull --rebase origin main
          git push
