name: Update Bucket

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: Manifest to update
        required: true
        type: choice
        options:
          - lockknife
          - bloatwarehatao

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release asset
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MANIFEST="${{ inputs.manifest }}"

          case "$MANIFEST" in
            lockknife)
              REPO="ImKKingshuk/LockKnife"
              ASSET_REGEX='^lockknife-[0-9.]+-cp312-abi3-win_amd64\.whl$'
              URL_SUFFIX='#/lockknife.whl'
              ;;
            bloatwarehatao)
              REPO="ImKKingshuk/BloatwareHatao"
              ASSET_REGEX='^bloatwarehatao-[0-9.]+-x86_64-pc-windows-msvc\.zip$'
              URL_SUFFIX=''
              ;;
            *)
              echo "::error::Unknown manifest: $MANIFEST"
              exit 1
              ;;
          esac

          RELEASE_JSON="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases/latest")"

          TAG="$(jq -r '.tag_name' <<<"$RELEASE_JSON")"
          VERSION="${TAG#v}"
          ASSET_URL="$(jq -r --arg rx "$ASSET_REGEX" '.assets[] | select(.name | test($rx)) | .browser_download_url' <<<"$RELEASE_JSON" | head -n1)"

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "::error::Could not resolve a release asset for ${MANIFEST}"
            exit 1
          fi

          curl -fsSL -o /tmp/release-asset "$ASSET_URL"
          ASSET_HASH="$(sha256sum /tmp/release-asset | awk '{print $1}')"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "url=${ASSET_URL}${URL_SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "sha256=${ASSET_HASH}" >> "$GITHUB_OUTPUT"

      - name: Update manifest file
        run: |
          MANIFEST_PATH="bucket/${{ inputs.manifest }}.json"
          TMP_FILE="$(mktemp)"

          if [ ! -f "$MANIFEST_PATH" ]; then
            case "${{ inputs.manifest }}" in
              bloatwarehatao)
                mkdir -p bucket
                jq -n '
                  {
                    version: "0.0.0",
                    description: "Ultimate Android bloatware removal and device optimization toolkit",
                    homepage: "https://github.com/ImKKingshuk/BloatwareHatao",
                    license: "GPL-3.0-only",
                    architecture: {
                      "64bit": {
                        url: "",
                        hash: ""
                      }
                    },
                    bin: "bloatwarehatao.exe",
                    checkver: {
                      url: "https://api.github.com/repos/ImKKingshuk/BloatwareHatao/releases/latest",
                      jsonpath: "$.tag_name",
                      regex: "v(?<version>.*)"
                    },
                    autoupdate: {
                      architecture: {
                        "64bit": {
                          url: "https://github.com/ImKKingshuk/BloatwareHatao/releases/download/v$version/bloatwarehatao-$version-x86_64-pc-windows-msvc.zip"
                        }
                      }
                    },
                    notes: [
                      "Install Android platform-tools separately if you need adb-driven workflows."
                    ]
                  }
                ' > "$MANIFEST_PATH"
                ;;
              *)
                echo "::error::Manifest file does not exist: $MANIFEST_PATH"
                exit 1
                ;;
            esac
          fi

          jq \
            --arg version "${{ steps.resolve.outputs.version }}" \
            --arg url "${{ steps.resolve.outputs.url }}" \
            --arg hash "${{ steps.resolve.outputs.sha256 }}" \
            '
              .version = $version
              | .architecture["64bit"].url = $url
              | .architecture["64bit"].hash = $hash
            ' "$MANIFEST_PATH" > "$TMP_FILE"

          mv "$TMP_FILE" "$MANIFEST_PATH"
          jq empty "$MANIFEST_PATH"

      - name: Detect manifest changes
        id: diff
        run: |
          if git diff --quiet -- "bucket/${{ inputs.manifest }}.json"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage updated manifest
        if: steps.diff.outputs.changed == 'true'
        run: |
          mkdir -p dist
          cp "bucket/${{ inputs.manifest }}.json" "dist/${{ inputs.manifest }}.json"

      - name: Upload updated manifest
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: updated-manifest
          path: dist/${{ inputs.manifest }}.json

  validate:
    needs: prepare
    if: needs.prepare.outputs.changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download updated manifest
        uses: actions/download-artifact@v4
        with:
          name: updated-manifest
          path: bucket

      - name: Install Scoop
        shell: powershell
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression

      - name: Add local bucket
        shell: powershell
        run: |
          $bucketRoot = (Resolve-Path $env:GITHUB_WORKSPACE).Path
          scoop bucket add imkkingshuk $bucketRoot

      - name: Install updated manifest
        shell: powershell
        run: |
          scoop install imkkingshuk/${{ inputs.manifest }}
          & "${{ inputs.manifest }}" --version

  publish:
    needs: [prepare, validate]
    if: needs.prepare.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download updated manifest
        uses: actions/download-artifact@v4
        with:
          name: updated-manifest
          path: bucket

      - name: Commit update
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

          git add "bucket/${{ inputs.manifest }}.json"

          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git commit -m "bucket: update ${{ inputs.manifest }} to v${{ needs.prepare.outputs.version }}"
          git pull --rebase origin main
          git push
